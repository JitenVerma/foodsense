services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: foodsense-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
    ports:
      - "${API_PUBLIC_PORT:-4000}:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    container_name: foodsense-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
